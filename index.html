<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>個人工作管理系統 (動態版)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .nav-link.active { background-color: #eff6ff; color: #1d4ed8; border-right: 4px solid #1d4ed8; }
        #mobile-sidebar { transition: transform 0.3s ease-in-out; }
        .sidebar-open { transform: translateX(0); }
        .sidebar-closed { transform: translateX(-100%); }
        /* 載入中動畫 */
        #loader { position: fixed; inset: 0; background: white; z-index: 100; display: flex; align-items: center; justify-content: center; flex-direction: column; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800">

    <div id="loader">
        <i class="fa-solid fa-circle-notch fa-spin text-4xl text-blue-600 mb-4"></i>
        <p class="text-slate-500 animate-pulse">正在從雲端同步資料...</p>
    </div>

    <div class="md:hidden bg-white border-b border-slate-200 p-4 flex justify-between items-center sticky top-0 z-50">
        <h1 class="text-lg font-bold text-blue-600">工作管理系統</h1>
        <button onclick="toggleMobileMenu()" class="text-slate-600 p-2">
            <i class="fa-solid fa-bars text-xl"></i>
        </button>
    </div>

    <div class="flex min-h-screen">
        <aside id="mobile-sidebar" class="fixed inset-y-0 left-0 z-50 w-64 bg-white border-r border-slate-200 flex flex-col h-screen md:sticky md:top-0 md:translate-x-0 sidebar-closed">
            <div class="p-6 flex justify-between items-center">
                <div>
                    <h1 class="text-xl font-bold text-blue-600 tracking-tight">工作管理系統</h1>
                    <p class="text-xs text-slate-400 mt-1">Personal Workspace v2.5</p>
                </div>
                <button onclick="toggleMobileMenu()" class="md:hidden text-slate-400">
                    <i class="fa-solid fa-xmark text-xl"></i>
                </button>
            </div>
            
            <nav id="sidebar-nav" class="flex-1 px-4 space-y-1 overflow-y-auto">
                </nav>

            <div id="update-time" class="p-4 border-t border-slate-100 text-[10px] text-slate-400">
                更新於: --
            </div>
        </aside>

        <div id="sidebar-overlay" onclick="toggleMobileMenu()" class="fixed inset-0 bg-slate-900/50 z-40 hidden md:hidden"></div>

        <main id="main-content" class="flex-1 p-6 md:p-12 overflow-y-auto">
            </main>
    </div>

    <script>
        // 【關鍵】請把你的 Google Apps Script 網址貼在下面這裡
        const API_URL = "https://script.google.com/macros/s/AKfycbycqutj7gKD3iF7jpVnz1TkmlGJ_Pzfe2RsaGINL0Y6M4tjUyQ7M2pdK8K_mwKFjy0t/exec";

        let appData = {};

        async function init() {
            try {
                const response = await fetch(API_URL);
                appData = await response.json();
                
                renderSidebar();
                renderSections();
                
                // 隱藏載入動畫
                document.getElementById('loader').style.display = 'none';
                document.getElementById('update-time').innerText = `更新於: ${appData.lastUpdate}`;
                
                // 預設顯示第一頁 (Home)
                showTab('home');
            } catch (err) {
                console.error("資料抓取失敗:", err);
                alert("無法從 Google Sheets 取得資料，請檢查 API 網址與權限。");
            }
        }

        function renderSidebar() {
            const nav = document.getElementById('sidebar-nav');
            // 按 Sort 排序
            const sortedCategories = appData.categories.sort((a, b) => a.Sort - b.Sort);
            
            nav.innerHTML = sortedCategories.map(cat => `
                <button onclick="showTab('${cat.ID}')" id="btn-${cat.ID}" class="nav-link w-full flex items-center px-4 py-3 text-sm font-medium rounded-lg text-slate-600 hover:bg-slate-50 transition-all">
                    <i class="fa-solid ${cat.Icon} mr-3 w-5"></i> ${cat.Title}
                </button>
            `).join('');
        }

        function renderSections() {
            const main = document.getElementById('main-content');
            
            main.innerHTML = appData.categories.map(cat => {
                let innerHtml = `<h2 class="text-3xl font-bold mb-8">${cat.Title}</h2>`;

                if (cat.ID === 'home') {
                    innerHtml += renderHomeView();
                } else if (cat.ID === 'future') {
                    innerHtml += renderFutureView();
                } else {
                    // 一般手冊內容
                    const contents = appData.content.filter(c => c.Category_ID === cat.ID);
                    innerHtml += contents.map(item => `
                        <div class="bg-white rounded-2xl p-6 shadow-sm border border-slate-100 mb-6">
                            <h3 class="font-bold text-lg mb-3 text-blue-600 underline underline-offset-4">${item.Title}</h3>
                            <p class="text-slate-600 mb-4">${item.Description}</p>
                            ${item.Code_Instruction ? `
                                <div class="bg-slate-800 text-emerald-400 p-4 rounded-xl font-mono text-sm overflow-x-auto">
                                    ${item.Code_Instruction}
                                </div>
                            ` : ''}
                        </div>
                    `).join('');
                }

                return `<section id="${cat.ID}" class="tab-content">${innerHtml}</section>`;
            }).join('');
        }

        function renderHomeView() {
            // 從 Todos 找出 check 最多的專案當作看板
            return `
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="bg-blue-600 text-white p-8 rounded-3xl shadow-lg shadow-blue-200">
                        <h3 class="text-lg opacity-80">系統狀態</h3>
                        <p class="text-2xl font-bold mt-2">資料庫連線正常</p>
                        <div class="mt-6 flex items-center gap-2">
                            <i class="fa-solid fa-cloud-check"></i> 雲端同步完成
                        </div>
                    </div>
                </div>
            `;
        }

        function renderFutureView() {
            const checkItems = appData.todos.filter(t => t.Status === 'check');
            const todoItems = appData.todos.filter(t => t.Status === 'false');
            
            // 抓取擴充功能 (Category_ID 為 future_expand 的內容)
            const expands = appData.content.filter(c => c.Category_ID === 'future_expand');

            return `
                <div class="bg-white rounded-3xl p-8 shadow-sm border border-slate-100 mb-12">
                    <h3 class="text-xl font-bold mb-6">開發進度藍圖</h3>
                    <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                        <div>
                            <h4 class="text-xs font-bold text-slate-400 uppercase mb-4">已完成 (Check)</h4>
                            <ul class="space-y-2">
                                ${checkItems.map(i => `<li class="text-slate-400 line-through text-sm flex gap-2"><i class="fa-solid fa-check text-green-500"></i>${i.Task}</li>`).join('')}
                            </ul>
                        </div>
                        <div>
                            <h4 class="text-xs font-bold text-slate-400 uppercase mb-4">進行中 (Todo)</h4>
                            <div class="space-y-3">
                                ${todoItems.map(i => `
                                    <div class="bg-blue-50 border border-blue-100 p-3 rounded-xl text-sm font-bold flex gap-3">
                                        <i class="fa-regular fa-square text-blue-400"></i> ${i.Task}
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    </div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    ${expands.map(ex => `
                        <div class="bg-slate-50 p-6 rounded-2xl border border-slate-100">
                            <h5 class="font-bold text-slate-800 mb-2">${ex.Title}</h5>
                            <p class="text-xs text-slate-500">${ex.Description}</p>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function showTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            
            const target = document.getElementById(tabId);
            if(target) target.classList.add('active');
            
            const btn = document.getElementById(`btn-${tabId}`);
            if(btn) btn.classList.add('active');

            if (window.innerWidth < 768) {
                const sidebar = document.getElementById('mobile-sidebar');
                if (sidebar.classList.contains('sidebar-open')) toggleMobileMenu();
            }
        }

        function toggleMobileMenu() {
            const sidebar = document.getElementById('mobile-sidebar');
            const overlay = document.getElementById('sidebar-overlay');
            const isOpen = sidebar.classList.contains('sidebar-open');
            
            sidebar.classList.toggle('sidebar-open', !isOpen);
            sidebar.classList.toggle('sidebar-closed', isOpen);
            overlay.classList.toggle('hidden', isOpen);
        }

        init();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>個人工作管理系統 | Professional Workspace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap');
        
        body { 
            font-family: 'Inter', 'Noto Sans TC', sans-serif; 
            background-color: #f1f5f9; 
            padding-bottom: 70px; 
        }
        @media (min-width: 768px) {
            body { padding-bottom: 0; }
        }
        
        .tab-content { display: none; animation: fadeIn 0.3s ease-out; }
        .tab-content.active { display: block; }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .nav-link.active {
            background: linear-gradient(to right, #eff6ff, #dbeafe);
            color: #1d4ed8;
            border-right: 4px solid #1d4ed8;
            font-weight: 700;
        }

        .bottom-nav-link.active { color: #1d4ed8; }
        .bottom-nav-link.active i { transform: translateY(-2px); color: #1d4ed8; }

        .content-card {
            background-color: #ffffff;
            border: 1px solid #e2e8f0;
            box-shadow: 0 4px 12px -2px rgba(0, 0, 0, 0.05);
            border-radius: 2rem;
        }

        details summary::-webkit-details-marker { display:none; }
        details summary { outline: none; list-style: none; }
        details[open] summary i.fa-chevron-down { transform: rotate(180deg); }
        
        #mobile-sidebar { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .sidebar-open { transform: translateX(0); }
        .sidebar-closed { transform: translateX(-100%); }
    </style>
</head>
<body class="text-slate-900">

    <div class="md:hidden bg-white/90 backdrop-blur-md border-b border-slate-200 p-4 flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center text-white">
                <i class="fa-solid fa-terminal text-xs"></i>
            </div>
            <h1 class="font-bold text-slate-800 text-sm tracking-tight">工作管理系統</h1>
        </div>
        <button onclick="toggleMobileMenu()" class="text-slate-600 w-10 h-10 flex items-center justify-center rounded-full hover:bg-slate-100">
            <i class="fa-solid fa-bars-staggered text-xl"></i>
        </button>
    </div>

    <div class="flex min-h-screen">
        <aside id="mobile-sidebar" class="fixed inset-y-0 left-0 z-50 w-72 bg-white border-r border-slate-200 flex flex-col h-screen md:sticky md:top-0 md:translate-x-0 sidebar-closed">
            <div class="p-8">
                <div class="flex items-center gap-3 mb-2">
                    <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center shadow-lg shadow-blue-200">
                        <i class="fa-solid fa-code text-white text-lg"></i>
                    </div>
                    <div>
                        <h1 class="text-lg font-bold tracking-tight text-slate-800">個人工作站</h1>
                        <p class="text-[10px] text-slate-400 font-medium uppercase tracking-widest text-xs">Workspace v2.5</p>
                    </div>
                </div>
            </div>
            
            <nav class="flex-1 px-4 space-y-1">
                <button onclick="showTab('home')" class="nav-link active w-full flex items-center px-4 py-3.5 text-sm rounded-xl transition-all">
                    <i class="fa-solid fa-house-user mr-3 w-5"></i> 首頁概覽
                </button>
                <div class="py-2"><hr class="border-slate-100"></div>
                <button onclick="showTab('projects')" class="nav-link w-full flex items-center px-4 py-3.5 text-sm rounded-xl text-slate-600 hover:bg-slate-50 transition-all">
                    <i class="fa-solid fa-rocket mr-3 w-5 text-orange-500"></i> 目前專案
                </button>
            </nav>
        </aside>

        <div class="md:hidden fixed bottom-0 left-0 right-0 bg-white/95 backdrop-blur-md border-t border-slate-200 flex justify-around py-3 px-2 z-50">
            <button onclick="showTab('home')" class="bottom-nav-link active flex flex-col items-center gap-1 transition-all">
                <i class="fa-solid fa-house-user text-xl"></i>
                <span class="text-[10px] font-bold">首頁</span>
            </button>
            <button onclick="showTab('projects')" class="bottom-nav-link flex flex-col items-center gap-1 transition-all text-slate-400">
                <i class="fa-solid fa-rocket text-xl"></i>
                <span class="text-[10px] font-bold">專案</span>
            </button>
        </div>

        <div id="sidebar-overlay" onclick="toggleMobileMenu()" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-40 hidden md:hidden"></div>

        <main class="flex-1 p-5 md:p-16 max-w-6xl mx-auto w-full">
            <section id="home" class="tab-content active">
                <header class="max-w-3xl">
                    <p class="text-red-600 font-bold mt-10 flex items-center gap-3 bg-red-50 p-4 rounded-2xl border border-red-100">
                        <i class="fa-solid fa-circle-exclamation text-xl"></i>
                        <span>資料整理中，請至「目前專案」頁籤</span>
                    </p>
                </header>
            </section>

            <section id="projects" class="tab-content space-y-8">
                <header>
                    <h2 class="text-3xl md:text-4xl font-extrabold tracking-tight text-slate-900">目前專案</h2>
                </header>

                <div class="content-card p-6 md:p-10">
                    <div class="flex flex-col md:flex-row gap-6 items-start">
                        <div class="w-14 h-14 bg-emerald-500 rounded-2xl flex items-center justify-center text-white text-xl shadow-lg shadow-emerald-100 shrink-0">
                            <i class="fa-brands fa-line"></i>
                        </div>
                        <div class="flex-1 w-full">
                            <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-4">
                                <h3 class="text-2xl font-bold text-slate-900">LINE 回覆訊息 專案</h3>
                            </div>
                            
                            <div class="space-y-4">
                                <details open class="group">
                                    <summary class="flex justify-between items-center bg-blue-50/50 p-4 rounded-xl cursor-pointer font-bold text-blue-700 text-sm">
                                        <div class="flex items-center gap-2"><i class="fa-solid fa-list-check"></i> To Do List</div>
                                        <i class="fa-solid fa-chevron-down transition-transform"></i>
                                    </summary>
                                    <div class="p-4 space-y-2">
                                        <div class="border border-blue-100 p-3 rounded-xl flex items-center gap-3"><i class="fa-solid fa-check text-emerald-500"></i><span class="text-xs font-bold text-slate-700">完成串接 Gemini 與記憶功能</span></div>
                                        <div class="border border-blue-100 p-3 rounded-xl flex items-center gap-3"><i class="fa-solid fa-check text-emerald-500"></i><span class="text-xs font-bold text-slate-700">完成 AI 真修改程式功能</span></div>
                                        <div class="border border-blue-100 p-3 rounded-xl flex items-center gap-3"><i class="fa-solid fa-check text-emerald-500"></i><span class="text-xs font-bold text-slate-700">完成復原程式功能</span></div>
                                        <div class="border border-blue-100 p-3 rounded-xl flex items-center gap-3"><i class="fa-solid fa-check text-emerald-500"></i><span class="text-xs font-bold text-slate-700">完成錯誤訊息記錄功能</span></div>
                                        <div class="border border-blue-100 p-3 rounded-xl flex items-center gap-3"><i class="fa-solid fa-check text-emerald-500"></i><span class="text-xs font-bold text-slate-700">完成提示字功能</span></div>
                                    </div>
                                </details>

                                <details class="group">
                                    <summary class="flex justify-between items-center bg-slate-50 p-4 rounded-xl cursor-pointer font-bold text-slate-400 text-sm">
                                        <div class="flex items-center gap-2"><i class="fa-solid fa-hourglass-half"></i> 暫不處理</div>
                                        <i class="fa-solid fa-chevron-down transition-transform"></i>
                                    </summary>
                                    <div class="p-4 space-y-3">
                                        <div class="bg-slate-50 p-3.5 rounded-xl border border-slate-100">
                                            <span class="text-xs font-bold text-slate-500 block mb-1">AI 回覆正確資訊</span>
                                            <span class="text-[10px] text-slate-400 italic font-medium">原因：資料不完整，無法正確辨識</span>
                                        </div>
                                    </div>
                                </details>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script>
        function showTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            const target = document.getElementById(tabId);
            if(target) target.classList.add('active');
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            const activeSidebarLinks = document.querySelectorAll(`aside button[onclick="showTab('${tabId}')"]`);
            activeSidebarLinks.forEach(link => link.classList.add('active'));
            if (window.innerWidth < 768) {
                const sidebar = document.getElementById('mobile-sidebar');
                if (sidebar.classList.contains('sidebar-open')) toggleMobileMenu();
            }
        }
        function toggleMobileMenu() {
            const sidebar = document.getElementById('mobile-sidebar');
            const overlay = document.getElementById('sidebar-overlay');
            const isOpen = sidebar.classList.contains('sidebar-open');
            if (isOpen) {
                sidebar.classList.replace('sidebar-open', 'sidebar-closed');
                overlay.classList.add('hidden');
            } else {
                sidebar.classList.replace('sidebar-closed', 'sidebar-open');
                overlay.classList.remove('hidden');
            }
        }
    </script>
</body>
</html>
